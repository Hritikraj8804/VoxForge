<!DOCTYPE html>
<html>
<head>
  <title>Voice Generator 🎤</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background: #f5f5f5;
    }

    input, select, button {
      padding: 10px;
      margin: 10px;
      width: 250px;
      font-size: 14px;
    }

    button {
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    audio {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2>🎤 Voice Generator</h2>

<input id="text" placeholder="Enter your text" />

<br>

<select id="voice">
  <option value="Joanna">Joanna (Female)</option>
  <option value="Matthew">Matthew (Male)</option>
  <option value="Brian">Brian (British)</option>
</select>

<br>

<select id="rate">
  <option value="slow">Slow</option>
  <option value="medium" selected>Medium</option>
  <option value="fast">Fast</option>
</select>

<br>

<button onclick="convert()">Generate Audio</button>

<p id="status"></p>

<audio id="player" controls></audio>

<script>
async function convert() {
  try {
    const text = document.getElementById("text").value;
    const voice = document.getElementById("voice").value;
    const rate = document.getElementById("rate").value;

    if (!text) {
      alert("Enter text first!");
      return;
    }

    document.getElementById("status").innerText = "Processing...";

    const res = await fetch("YOUR_API_GATEWAY_URL_HERE/convert", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: text,
        voice: voice,
        rate: rate
      })
    });

    if (!res.ok) throw new Error("API failed");

    const data = await res.json();

    document.getElementById("player").src = data.audioUrl;
    document.getElementById("player").play();

    document.getElementById("status").innerText = "Done 🎧";

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Error ❌";
  }
}
</script>

</body>
</html>
